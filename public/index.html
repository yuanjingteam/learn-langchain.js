<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAG 知识库问答</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 12px 24px;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header .title-group {
      text-align: center;
      flex: 1;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
    }

    header p {
      font-size: 13px;
      color: #888;
      margin-top: 2px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toolbar select, .toolbar button {
      padding: 6px 12px;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      color: #ccc;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .toolbar select:hover, .toolbar button:hover {
      border-color: #555;
      color: #fff;
    }

    .toolbar button.danger:hover {
      border-color: #ef4444;
      color: #ef4444;
    }

    .toolbar label {
      font-size: 12px;
      color: #888;
    }

    .toolbar .conversational-only {
      display: none;
    }

    .toolbar.show-conversational .conversational-only {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 720px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      gap: 12px;
    }

    .message.user {
      flex-direction: row-reverse;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .message.user .avatar {
      background: #2563eb;
      color: #fff;
    }

    .message.assistant .avatar {
      background: #10b981;
      color: #fff;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .bubble {
      background: #2563eb;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.assistant .bubble {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-bottom-left-radius: 4px;
    }

    .message.assistant .bubble.streaming::after {
      content: '▊';
      animation: blink 0.8s infinite;
      color: #10b981;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 4px 0;
    }

    .typing-indicator span {
      width: 6px;
      height: 6px;
      background: #888;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    #input-area {
      padding: 12px 24px 20px;
      background: #1a1a1a;
      border-top: 1px solid #2a2a2a;
    }

    #input-wrapper {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      gap: 8px;
    }

    #question-input {
      flex: 1;
      padding: 12px 16px;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 12px;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    #question-input:focus {
      border-color: #2563eb;
    }

    #question-input::placeholder {
      color: #666;
    }

    #send-btn {
      padding: 12px 20px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    #send-btn:hover { background: #1d4ed8; }
    #send-btn:disabled { background: #333; color: #666; cursor: not-allowed; }

    .welcome {
      max-width: 720px;
      margin: auto;
      text-align: center;
      color: #555;
      font-size: 14px;
      padding: 40px 0;
    }

    .status-bar {
      max-width: 720px;
      margin: 0 auto;
      width: 100%;
      font-size: 11px;
      color: #555;
      text-align: center;
      padding: 4px 0;
    }
  </style>
</head>
<body>
  <header>
    <div style="width: 200px;"></div>
    <div class="title-group">
      <h1>RAG 知识库问答系统</h1>
      <p>基于 LangChain + 通义千问 + MemoryVectorStore</p>
    </div>
    <div class="toolbar show-conversational">
      <label for="chat-mode">模式:</label>
      <select id="chat-mode">
        <option value="conversational">对话式</option>
        <option value="single">单轮</option>
      </select>
      <div class="conversational-only">
        <label for="search-mode">检索:</label>
        <select id="search-mode">
          <option value="similarity">Similarity</option>
          <option value="mmr">MMR</option>
        </select>
        <button id="clear-btn" class="danger" title="清除聊天历史">清除历史</button>
      </div>
    </div>
  </header>

  <div id="chat-container">
    <div class="welcome">输入你的问题，开始与知识库对话</div>
  </div>

  <div id="input-area">
    <div id="input-wrapper">
      <input type="text" id="question-input" placeholder="请输入你的问题..." autocomplete="off">
      <button id="send-btn">发送</button>
    </div>
  </div>

  <script>
    const chatContainer = document.getElementById('chat-container');
    const questionInput = document.getElementById('question-input');
    const sendBtn = document.getElementById('send-btn');
    const clearBtn = document.getElementById('clear-btn');
    const searchMode = document.getElementById('search-mode');
    const chatMode = document.getElementById('chat-mode');
    let welcomeEl = chatContainer.querySelector('.welcome');
    let isStreaming = false;

    function removeWelcome() {
      if (welcomeEl) {
        welcomeEl.remove();
        welcomeEl = null;
      }
    }

    function addMessage(role, content) {
      removeWelcome();
      const div = document.createElement('div');
      div.className = `message ${role}`;
      const avatar = role === 'user' ? 'U' : 'AI';
      div.innerHTML = `
        <div class="avatar">${avatar}</div>
        <div class="bubble">${escapeHtml(content)}</div>
      `;
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
      return div;
    }

    function createStreamingMessage() {
      removeWelcome();
      const div = document.createElement('div');
      div.className = 'message assistant';
      div.innerHTML = `
        <div class="avatar">AI</div>
        <div class="bubble streaming"></div>
      `;
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
      return div.querySelector('.bubble');
    }

    function addTypingIndicator() {
      removeWelcome();
      const div = document.createElement('div');
      div.className = 'message assistant';
      div.id = 'typing';
      div.innerHTML = `
        <div class="avatar">AI</div>
        <div class="bubble">
          <div class="typing-indicator"><span></span><span></span><span></span></div>
        </div>
      `;
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function removeTypingIndicator() {
      const el = document.getElementById('typing');
      if (el) el.remove();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function sendQuestion() {
      const question = questionInput.value.trim();
      if (!question || isStreaming) return;

      addMessage('user', question);
      questionInput.value = '';
      isStreaming = true;
      sendBtn.disabled = true;

      const mode = chatMode.value;

      try {
        if (mode === 'single') {
          await sendSingleTurn(question);
        } else {
          await sendConversational(question);
        }
      } catch (err) {
        removeTypingIndicator();
        addMessage('assistant', '网络错误，请检查服务是否运行');
      } finally {
        isStreaming = false;
        sendBtn.disabled = false;
        questionInput.focus();
      }
    }

    async function sendSingleTurn(question) {
      addTypingIndicator();
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question })
      });
      removeTypingIndicator();
      const data = await res.json();
      if (data.error) {
        addMessage('assistant', '错误: ' + data.error);
      } else {
        addMessage('assistant', data.answer);
      }
    }

    async function sendConversational(question) {
      const bubble = createStreamingMessage();
      let fullText = '';

      const res = await fetch('/api/chat/conversational', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          question,
          searchType: searchMode.value
        })
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const json = line.slice(6);
          try {
            const data = JSON.parse(json);
            if (data.error) {
              bubble.classList.remove('streaming');
              bubble.textContent = '错误: ' + data.error;
              return;
            }
            if (data.done) {
              bubble.classList.remove('streaming');
              return;
            }
            if (data.chunk) {
              fullText += data.chunk;
              bubble.textContent = fullText;
              chatContainer.scrollTop = chatContainer.scrollHeight;
            }
          } catch {}
        }
      }
      bubble.classList.remove('streaming');
    }

    async function clearHistory() {
      try {
        await fetch('/api/chat/history', { method: 'DELETE' });
        chatContainer.innerHTML = '<div class="welcome">聊天历史已清除，输入问题开始新对话</div>';
        welcomeEl = chatContainer.querySelector('.welcome');
      } catch (err) {
        alert('清除失败: ' + err.message);
      }
    }

    sendBtn.addEventListener('click', sendQuestion);
    clearBtn.addEventListener('click', clearHistory);
    questionInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendQuestion();
      }
    });

    const toolbar = document.querySelector('.toolbar');
    chatMode.addEventListener('change', () => {
      if (chatMode.value === 'conversational') {
        toolbar.classList.add('show-conversational');
      } else {
        toolbar.classList.remove('show-conversational');
      }
    });

    questionInput.focus();
  </script>
</body>
</html>
